name: Process Avenseal communications

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: avenseal-communications-scheduler
  cancel-in-progress: false

jobs:
  process:
    name: Process reminders and communications
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      AVENSEAL_APP_URL: ${{ secrets.AVENSEAL_APP_URL }}
      COMMUNICATION_PROCESSOR_SECRET: ${{ secrets.COMMUNICATION_PROCESSOR_SECRET }}

    steps:
      - name: Validate scheduler configuration
        id: configuration
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${AVENSEAL_APP_URL:-}" ]]; then
            echo "AVENSEAL_APP_URL is not configured."
            exit 1
          fi

          if [[ -z "${COMMUNICATION_PROCESSOR_SECRET:-}" ]]; then
            echo "COMMUNICATION_PROCESSOR_SECRET is not configured."
            exit 1
          fi

          app_url="${AVENSEAL_APP_URL%/}"
          if [[ ! "$app_url" =~ ^https:// ]]; then
            echo "AVENSEAL_APP_URL must use HTTPS."
            exit 1
          fi

          echo "app_url=$app_url" >> "$GITHUB_OUTPUT"

      - name: Process reminders before communications
        shell: bash
        env:
          APP_URL: ${{ steps.configuration.outputs.app_url }}
        run: |
          set -euo pipefail

          process_endpoint() {
            local endpoint_name="$1"
            local endpoint_url="$2"
            local attempt=1
            local max_attempts=3
            local http_status
            local curl_status

            while true; do
              set +e
              http_status="$(curl \
                --silent \
                --show-error \
                --fail \
                --request POST \
                --header "Authorization: Bearer ${COMMUNICATION_PROCESSOR_SECRET}" \
                --connect-timeout 10 \
                --max-time 60 \
                --output /dev/null \
                --write-out "%{http_code}" \
                "$endpoint_url")"
              curl_status=$?
              set -e

              if [[ "$curl_status" -eq 0 ]]; then
                echo "$endpoint_name succeeded (HTTP $http_status)."
                return 0
              fi

              if [[ ( "$http_status" == "000" || "$http_status" =~ ^5[0-9]{2}$ ) && "$attempt" -lt "$max_attempts" ]]; then
                attempt=$((attempt + 1))
                sleep 5
                continue
              fi

              echo "$endpoint_name failed (HTTP ${http_status:-000})."
              return 1
            done
          }

          process_endpoint "Appointment reminders" "$APP_URL/api/internal/reminders/process"
          process_endpoint "Queued communications" "$APP_URL/api/internal/communications/process"
